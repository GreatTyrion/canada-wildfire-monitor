<!doctype html>
<html lang="en-CA">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#171B1E" />
    <meta
      name="description"
      content="Live map of Canadian wildfires, smoke forecast, and air quality — with practical guidance if you are affected."
    />
    <title>Canada Wildfire Monitor</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Condensed:wght@600&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="topbar">
      <h1 class="topbar__brand">Canada<br />Wildfire Monitor</h1>
      <div id="status-bar" class="topbar__status"></div>
      <div class="topbar__actions">
        <button id="btn-locate" class="btn btn--primary" type="button">Check my location</button>
        <button id="btn-safety" class="btn" type="button">Safety guide</button>
      </div>
    </header>

    <main class="stage">
      <div id="map" class="stage__map" role="application" aria-label="Wildfire map of Canada"></div>
      <aside id="layer-panel" class="layers"></aside>
      <div id="scrubber" class="scrubber"></div>
      <aside id="drawer" class="drawer" aria-hidden="true"></aside>
      <p id="data-note" class="data-note" hidden></p>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
